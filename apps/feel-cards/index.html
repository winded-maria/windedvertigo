<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FAF7F1" />
  <title>feel cards: a quiet game of interpretation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #ffebd2;
      --sand: #fff5e6;
      --rose: #cb7858;
      --sage: #cb7858;
      --teal: #273248;
      --terracotta: #b15043;
      --twilight: #273248;
      --gold: #b15043;
      --plum: #273248;
      --ink: #273248;
      --ink-soft: #4e5a72;
      --line: #e6d9bf;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--cream);
      color: var(--ink);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      min-height: 100dvh;
    }
    body {
      background-image: radial-gradient(circle at 20% 10%, rgba(201,123,93,0.04), transparent 40%),
                        radial-gradient(circle at 80% 90%, rgba(91,107,140,0.05), transparent 45%);
    }
    .serif { font-family: 'Inter', -apple-system, system-ui, sans-serif; font-weight: 300; }
    .screen {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 28px 22px calc(28px + env(safe-area-inset-bottom));
      max-width: 640px;
      margin: 0 auto;
      width: 100%;
    }
    button {
      font-family: inherit;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      padding: 14px 26px;
      border-radius: 999px;
      transition: transform 180ms ease, background 180ms ease, box-shadow 180ms ease;
      -webkit-tap-highlight-color: transparent;
    }
    button:active { transform: scale(0.97); }
    .btn-primary {
      background: var(--ink);
      color: var(--cream);
      box-shadow: 0 2px 12px rgba(38,36,40,0.18);
    }
    .btn-primary:hover { background: #1c2538; }
    .btn-primary:disabled {
      background: var(--line);
      color: var(--ink-soft);
      cursor: not-allowed;
      box-shadow: none;
    }
    .btn-ghost {
      background: transparent;
      color: var(--ink-soft);
      padding: 10px 18px;
      font-size: 14px;
    }
    .btn-ghost:hover { color: var(--ink); }
    h1, h2, h3 { font-family: 'Inter', -apple-system, system-ui, sans-serif; font-weight: 300; margin: 0; }
    h1 { font-size: 40px; letter-spacing: -0.02em; line-height: 1.05; }
    h2 { font-size: 28px; letter-spacing: -0.015em; line-height: 1.15; }
    h3 { font-size: 20px; }
    .muted { color: var(--ink-soft); }
    .tiny { font-size: 12px; letter-spacing: 0.08em; color: var(--ink-soft); }
    .prompt {
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      font-size: 26px;
      line-height: 1.25;
      font-weight: 400;
      letter-spacing: -0.01em;
      color: var(--ink);
    }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin-top: 20px;
    }
    .card {
      aspect-ratio: 2/3;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 3px 14px rgba(38,36,40,0.08), 0 1px 3px rgba(38,36,40,0.04);
      transition: transform 220ms cubic-bezier(.2,.8,.3,1), box-shadow 220ms ease, outline-offset 150ms ease;
      cursor: pointer;
      position: relative;
      outline: 3px solid transparent;
      outline-offset: 0;
      -webkit-tap-highlight-color: transparent;
      background: var(--line);
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(38,36,40,0.14), 0 2px 6px rgba(38,36,40,0.06);
    }
    .card.selected {
      outline-color: var(--ink);
      outline-offset: 4px;
      transform: translateY(-3px);
    }
    .card-art {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    .card-art svg { width: 100%; height: 100%; display: block; }
    .card-label {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 18px 10px 10px;
      text-align: center;
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      font-size: 12px;
      font-style: italic;
      color: var(--ink);
      letter-spacing: 0.01em;
      line-height: 1.2;
      background: linear-gradient(to top, rgba(255,235,210,0.96) 0%, rgba(255,235,210,0.88) 55%, rgba(255,235,210,0) 100%);
      pointer-events: none;
    }
    .card-xl {
      max-width: 320px;
      width: 100%;
      margin: 0 auto;
      aspect-ratio: 2/3;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 16px 48px rgba(38,36,40,0.18), 0 3px 10px rgba(38,36,40,0.08);
      background: var(--line);
      position: relative;
    }
    .card-xl .card-art svg { width: 100%; height: 100%; display: block; }
    .card-xl .card-label {
      padding: 40px 18px 22px;
      font-size: 20px;
      background: linear-gradient(to top, rgba(255,235,210,0.98) 10%, rgba(255,235,210,0.9) 60%, rgba(255,235,210,0) 100%);
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(38,36,40,0.06);
      color: var(--ink-soft);
      font-size: 13px;
      font-weight: 500;
    }
    .divider {
      height: 1px;
      background: var(--line);
      margin: 20px 0;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInSlow {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.94); }
      to { opacity: 1; transform: scale(1); }
    }
    .fade-in { animation: fadeIn 420ms ease both; }
    .fade-in-slow { animation: fadeInSlow 900ms ease both; }
    .scale-in { animation: scaleIn 500ms cubic-bezier(.2,.8,.3,1) both; }
    .stagger > * { opacity: 0; animation: fadeIn 500ms ease forwards; }
    .stagger > *:nth-child(1) { animation-delay: 40ms; }
    .stagger > *:nth-child(2) { animation-delay: 110ms; }
    .stagger > *:nth-child(3) { animation-delay: 180ms; }
    .stagger > *:nth-child(4) { animation-delay: 250ms; }
    .position-picker {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 16px;
    }
    .position-btn {
      aspect-ratio: 1;
      border-radius: 16px;
      background: var(--sand);
      border: 2px solid transparent;
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      font-size: 48px;
      color: var(--ink);
      cursor: pointer;
      transition: all 200ms ease;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .position-btn:hover { background: var(--rose); }
    .position-btn.active {
      background: var(--ink);
      color: var(--cream);
      transform: scale(1.02);
    }
    .difficulty-picker {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 22px;
    }
    .difficulty-btn {
      width: 100%;
      text-align: left;
      background: var(--sand);
      border: 2px solid transparent;
      border-radius: 18px;
      padding: 20px 22px;
      cursor: pointer;
      transition: all 220ms ease;
      -webkit-tap-highlight-color: transparent;
    }
    .difficulty-btn:hover { background: var(--rose); }
    .difficulty-btn .d-label {
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      font-size: 24px;
      line-height: 1.1;
      color: var(--ink);
      letter-spacing: -0.01em;
    }
    .difficulty-btn .d-blurb {
      font-size: 14px;
      line-height: 1.4;
      color: var(--ink-soft);
      margin-top: 4px;
      font-family: 'Inter', sans-serif;
    }
    .difficulty-btn.active {
      background: var(--ink);
      border-color: var(--ink);
      transform: scale(1.01);
    }
    .difficulty-btn.active .d-label,
    .difficulty-btn.active .d-blurb {
      color: var(--cream);
    }
    .role-banner {
      padding: 18px 20px;
      border-radius: 18px;
      margin: 16px 0 24px;
      text-align: center;
    }
    .role-banner.holder {
      background: linear-gradient(135deg, var(--rose) 0%, var(--sand) 100%);
    }
    .role-banner.interpreter {
      background: linear-gradient(135deg, var(--sage) 0%, var(--sand) 100%);
    }
    .role-banner .tiny { color: rgba(38,36,40,0.6); }
    .role-banner h2 { margin-top: 6px; }
    .progress-dots {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 14px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--line);
      transition: background 300ms ease, transform 300ms ease;
    }
    .dot.done { background: var(--ink-soft); }
    .dot.active { background: var(--ink); transform: scale(1.3); }
    .countdown {
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      font-size: 120px;
      line-height: 1;
      color: var(--ink);
      font-weight: 300;
    }
    .spacer { flex: 1; }
    .reveal-hint {
      text-align: center;
      padding: 14px 20px;
      margin-top: 20px;
      border-radius: 16px;
      background: rgba(233,197,193,0.35);
      color: var(--ink-soft);
      font-size: 14px;
    }
    .echo-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 16px;
    }
    .echo-q {
      padding: 16px 20px;
      border-radius: 14px;
      background: var(--sand);
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      font-size: 17px;
      line-height: 1.4;
    }
    .solution-input {
      width: 100%;
      margin-top: 22px;
      padding: 16px 18px;
      border: 1.5px solid var(--line);
      border-radius: 16px;
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      font-size: 17px;
      line-height: 1.45;
      color: var(--ink);
      background: #FFFCF5;
      resize: none;
      -webkit-appearance: none;
      transition: border-color 180ms ease, background 180ms ease;
      box-sizing: border-box;
    }
    .solution-input:focus {
      outline: none;
      border-color: var(--ink);
      background: #FFFFFF;
    }
    .solution-input::placeholder { color: var(--line); font-style: italic; }
    .reflection-card {
      margin-top: 30px;
      padding: 26px 22px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--rose) 0%, var(--sand) 100%);
    }
    .reflection-card .prompt {
      font-size: 22px;
      line-height: 1.3;
      margin-top: 10px;
    }
    .solutions-recap {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 22px;
    }
    .solution-card {
      padding: 16px 18px;
      border-radius: 14px;
      background: var(--sand);
      border-left: 3px solid var(--terracotta);
    }
    .solution-card .scenario {
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      font-size: 13px;
      font-style: italic;
      color: var(--ink-soft);
      line-height: 1.35;
      margin-top: 4px;
    }
    .solution-card .move {
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.4;
      color: var(--ink);
      margin-top: 10px;
    }
    .solution-card .move.empty {
      color: var(--ink-soft);
      font-style: italic;
    }
    .footer-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin-top: 20px;
    }
    .wv-wordmark {
      color: var(--ink);
      font-style: italic;
      letter-spacing: -0.01em;
      font-weight: 400;
    }
    @media (min-width: 500px) {
      .card-grid { grid-template-columns: repeat(4, 1fr); }
      h1 { font-size: 52px; }
      .prompt { font-size: 32px; }
    }
    @media (max-width: 340px) {
      .prompt { font-size: 22px; }
      h1 { font-size: 34px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    // ============================================================
    // FEEL CARDS — a quiet game of interpretation
    // Built for winded.vertigo, April 2026
    // ============================================================

    // ---------- CARD DECK ----------
    // 12 composition archetypes × 3 palette variants = 36 cards
    // Palettes (background, primary, accent, shadow)
    const PAL = {
      deep:      { bg: '#273248', p: '#ffebd2', a: '#cb7858', s: '#b15043' },
      warmth:    { bg: '#ffebd2', p: '#273248', a: '#b15043', s: '#cb7858' },
      ember:     { bg: '#b15043', p: '#ffebd2', a: '#cb7858', s: '#273248' },
      sienna:    { bg: '#cb7858', p: '#273248', a: '#ffebd2', s: '#b15043' },
      duskblue:  { bg: '#2f3a54', p: '#cb7858', a: '#ffebd2', s: '#b15043' },
      softcream: { bg: '#fff5e6', p: '#273248', a: '#cb7858', s: '#b15043' },
    };

    // Composition renderers — each returns an inner SVG string
    // Canvas: 200x300 viewBox
    const COMP = {
      horizon: (p) => `
        <rect width="200" height="300" fill="${p.bg}"/>
        <rect y="190" width="200" height="110" fill="${p.s}" opacity="0.18"/>
        <circle cx="100" cy="155" r="42" fill="${p.a}"/>
        <line x1="0" y1="190" x2="200" y2="190" stroke="${p.p}" stroke-width="1.5" opacity="0.5"/>`,
      wave: (p) => `
        <rect width="200" height="300" fill="${p.bg}"/>
        <path d="M-10 180 Q 50 120, 100 180 T 210 180 L 210 310 L -10 310 Z" fill="${p.p}" opacity="0.85"/>
        <path d="M-10 220 Q 60 160, 110 220 T 220 220 L 220 310 L -10 310 Z" fill="${p.s}" opacity="0.55"/>
        <circle cx="160" cy="80" r="20" fill="${p.a}" opacity="0.9"/>`,
      doorway: (p) => `
        <rect width="200" height="300" fill="${p.bg}"/>
        <path d="M60 260 L60 140 Q60 70, 100 70 Q140 70, 140 140 L140 260 Z" fill="${p.p}"/>
        <path d="M76 260 L76 145 Q76 88, 100 88 Q124 88, 124 145 L124 260 Z" fill="${p.a}" opacity="0.95"/>
        <circle cx="100" cy="155" r="6" fill="${p.bg}"/>`,
      mountain: (p) => `
        <rect width="200" height="300" fill="${p.bg}"/>
        <path d="M0 260 L60 140 L100 190 L155 110 L200 170 L200 300 L0 300 Z" fill="${p.p}"/>
        <path d="M0 260 L40 200 L80 240 L130 180 L200 240 L200 300 L0 300 Z" fill="${p.s}" opacity="0.55"/>
        <circle cx="50" cy="70" r="14" fill="${p.a}" opacity="0.85"/>`,
      spiral: (p) => `
        <rect width="200" height="300" fill="${p.bg}"/>
        <g transform="translate(100 150)">
          <path d="M0 0 Q 30 -30, 60 0 T 90 50 Q 60 100, 10 80 Q -50 50, -30 -10 Q 0 -60, 40 -40" fill="none" stroke="${p.p}" stroke-width="6" stroke-linecap="round"/>
          <path d="M0 0 Q 15 -15, 30 0 T 40 20" fill="none" stroke="${p.a}" stroke-width="4" stroke-linecap="round"/>
          <circle r="5" fill="${p.s}"/>
        </g>`,
      broken_circle: (p) => `
        <rect width="200" height="300" fill="${p.bg}"/>
        <path d="M100 60 A 80 80 0 1 1 40 200" fill="none" stroke="${p.p}" stroke-width="14" stroke-linecap="round"/>
        <circle cx="150" cy="220" r="10" fill="${p.a}"/>
        <circle cx="60" cy="100" r="6" fill="${p.s}" opacity="0.6"/>`,
      threads: (p) => `
        <rect width="200" height="300" fill="${p.bg}"/>
        <line x1="20" y1="30" x2="60" y2="270" stroke="${p.p}" stroke-width="3" stroke-linecap="round"/>
        <line x1="80" y1="40" x2="140" y2="260" stroke="${p.s}" stroke-width="3" stroke-linecap="round" opacity="0.75"/>
        <line x1="160" y1="35" x2="180" y2="265" stroke="${p.a}" stroke-width="3" stroke-linecap="round"/>
        <line x1="50" y1="80" x2="170" y2="220" stroke="${p.p}" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
        <line x1="30" y1="220" x2="160" y2="90" stroke="${p.s}" stroke-width="2" stroke-linecap="round" opacity="0.5"/>`,
      pool: (p) => `
        <rect width="200" height="300" fill="${p.bg}"/>
        <ellipse cx="100" cy="170" rx="78" ry="68" fill="${p.p}"/>
        <ellipse cx="100" cy="170" rx="52" ry="44" fill="${p.s}" opacity="0.55"/>
        <ellipse cx="100" cy="170" rx="24" ry="20" fill="${p.a}"/>
        <circle cx="130" cy="60" r="5" fill="${p.p}" opacity="0.6"/>
        <circle cx="70" cy="80" r="3" fill="${p.p}" opacity="0.4"/>`,
      fracture: (p) => `
        <rect width="200" height="300" fill="${p.bg}"/>
        <rect x="30" y="50" width="140" height="200" fill="${p.p}" opacity="0.85"/>
        <path d="M100 50 L 85 130 L 110 160 L 95 250" fill="none" stroke="${p.bg}" stroke-width="5" stroke-linejoin="miter"/>
        <path d="M100 50 L 115 110 L 95 145 L 120 250" fill="none" stroke="${p.a}" stroke-width="3" opacity="0.8"/>`,
      column: (p) => `
        <rect width="200" height="300" fill="${p.bg}"/>
        <rect x="80" y="40" width="40" height="220" fill="${p.p}"/>
        <rect x="70" y="40" width="60" height="14" fill="${p.s}"/>
        <rect x="70" y="246" width="60" height="14" fill="${p.s}"/>
        <circle cx="100" cy="150" r="8" fill="${p.a}"/>`,
      branching: (p) => `
        <rect width="200" height="300" fill="${p.bg}"/>
        <path d="M100 270 L100 170" stroke="${p.p}" stroke-width="5" stroke-linecap="round"/>
        <path d="M100 170 L 60 110" stroke="${p.p}" stroke-width="4" stroke-linecap="round"/>
        <path d="M100 170 L 140 110" stroke="${p.p}" stroke-width="4" stroke-linecap="round"/>
        <path d="M100 170 L 100 90" stroke="${p.p}" stroke-width="3" stroke-linecap="round"/>
        <path d="M60 110 L 40 70" stroke="${p.s}" stroke-width="3" stroke-linecap="round"/>
        <path d="M140 110 L 160 70" stroke="${p.s}" stroke-width="3" stroke-linecap="round"/>
        <circle cx="40" cy="70" r="5" fill="${p.a}"/>
        <circle cx="160" cy="70" r="5" fill="${p.a}"/>
        <circle cx="100" cy="90" r="5" fill="${p.a}"/>`,
      echo: (p) => `
        <rect width="200" height="300" fill="${p.bg}"/>
        <circle cx="100" cy="150" r="22" fill="${p.p}"/>
        <circle cx="100" cy="150" r="44" fill="none" stroke="${p.p}" stroke-width="2.5" opacity="0.75"/>
        <circle cx="100" cy="150" r="68" fill="none" stroke="${p.p}" stroke-width="2" opacity="0.5"/>
        <circle cx="100" cy="150" r="92" fill="none" stroke="${p.p}" stroke-width="1.5" opacity="0.3"/>
        <circle cx="100" cy="150" r="10" fill="${p.a}"/>`,
    };

    // Build a 36-card deck: each composition × 3 distinct palettes
    const PALETTE_ORDER = [
      ['dawn','sea','fog'],
      ['rose','sea','meadow'],
      ['dusk','sand','ember'],
      ['fog','night','dawn'],
      ['ember','meadow','rose'],
      ['sea','rose','sand'],
      ['night','dawn','fog'],
      ['meadow','dusk','ember'],
      ['sand','night','rose'],
      ['rose','meadow','sea'],
      ['dusk','fog','ember'],
      ['night','ember','meadow'],
    ];
    const PALETTE_MAP = {
      dawn:   PAL.warmth,
      dusk:   PAL.duskblue,
      fog:    PAL.softcream,
      rose:   PAL.ember,
      sea:    PAL.deep,
      meadow: PAL.sienna,
      ember:  PAL.ember,
      night:  PAL.deep,
      sand:   PAL.warmth,
    };

    // Feeling + observable workplace action — one per card, ordered to match PALETTE_ORDER.
    // Every label pairs an internal state with a behavior you could literally watch
    // a person do in an office: writing a note, stepping out for water, DMing someone,
    // keeping their face neutral, closing the camera, etc. Universal across all 10 scenarios.
    const LABELS = {
      horizon:       ["i'm zoomed out, i name what actually matters here", "i feel settled, i offer a reframe",                    "i'm steady, i make space for someone else to speak"],
      wave:          ["i'm flooded, i pause before responding",             "i'm swept up, i write it down first",                  "something moves me, i say so out loud"],
      doorway:       ["i'm uncertain, i step in anyway",                    "i feel curious, i ask what we haven't tried yet",      "i'm hesitant, i name what's holding me back"],
      mountain:      ["i feel the weight, i name it in the room",           "i'm tired, i ask what we can let go of",               "i feel solid, i hold the group's direction"],
      spiral:        ["i keep returning to it, i try one more angle",       "i'm spinning, i ask someone what they see",            "something's unresolved, i name it before we move on"],
      broken_circle: ["something broke, i name it before we continue",      "i feel the gap, i propose how we close it",            "we lost something, i make space to acknowledge it"],
      threads:       ["i feel the tension, i hold both sides",              "i'm tracking something, i bring it into the open",     "i feel connected, i build on what they said"],
      pool:          ["i need to sit with it, i say not yet",               "i'm listening, i reflect back what i heard",           "i feel clear, i offer what i'm actually thinking"],
      fracture:      ["i'm hurt, i stay with it instead of moving past it", "something cracked, i say what i noticed",              "i feel sharp, i redirect toward the problem"],
      column:        ["i feel grounded, i give my honest assessment",       "i'm centered, i invite the disagreement in",           "i feel strong, i let someone else take the lead"],
      branching:     ["i feel open, i generate three options before choosing", "i'm energised, i reframe the whole problem",        "i feel creative, i invite the group to build on my thinking"],

    function dealHand(size = 4) {
      const idx = state.currentPromptIdx;
      if (idx !== null && SCENARIO_LABELS[idx]) {
        const archetypes = Object.keys(SCENARIO_LABELS[idx]);
        const scenarioPool = archetypes.map(arch => {
          const variants = DECK.filter(c => c.name.startsWith(arch + '-'));
          const picked = variants[Math.floor(Math.random() * variants.length)];
          return { ...picked, label: SCENARIO_LABELS[idx][arch] };
        });
        return shuffle(scenarioPool).slice(0, size);
      }
      return shuffle(DECK).slice(0, size);
    }

    function pickPrompt() {
      // Filter the scenario pool by chosen difficulty (if set).
      const allowed = state.difficulty
        ? PROMPTS.map((_, i) => i).filter(i => PROMPT_DIFFICULTY[i] === state.difficulty)
        : PROMPTS.map((_, i) => i);
      const unused = allowed.filter(i => !state.usedPrompts.includes(i));
      const pool = unused.length ? unused : allowed;
      const idx = pool[Math.floor(Math.random() * pool.length)];
      state.usedPrompts.push(idx);
      state.currentPromptIdx = idx;
      return PROMPTS[idx];
    }

    function holderForRound(round) {
      // round 0 → pos 1 holds, round 1 → pos 2 holds, round 2 → pos 3 holds
      return round + 1;
    }

    function isHolder() {
      return state.position === holderForRound(state.round);
    }

    // ---------- RENDER ----------
    function render() {
      const app = document.getElementById('app');
      app.innerHTML = screens[state.screen]();
      wireEvents();
    }

    function go(screenName) {
      state.screen = screenName;
      window.scrollTo({ top: 0, behavior: 'instant' });
      render();

            </div>
            <div class="spacer"></div>
            <button class="btn-primary" data-go="reflect" style="width: 100%;">open reflection →</button>
          </div>`;
      },

      reflect: () => `
        <div class="screen fade-in">
          <div class="progress-dots">
            ${[0,1,2].map(i => `<div class="dot ${i < state.round ? 'done' : ''} ${i === state.round ? 'active' : ''}"></div>`).join('')}
          </div>
          <div class="tiny" style="text-align: center; margin-top: 20px;">round ${state.round + 1} · reflection</div>
          <div class="reflection-card scale-in">
            <div class="tiny">for your trio</div>
            <div class="prompt serif">${REFLECTIONS[state.round]}</div>
          </div>
          <p class="muted" style="margin-top: 22px; font-size: 14px;">
            take a minute each to answer. read the question aloud if it helps.
          </p>
          <div class="spacer"></div>
          <button class="btn-primary" data-go="solve" style="width: 100%;">we've shared → write our move</button>
        </div>`,

      solve: () => {
        const existing = state.solutions[state.round] || '';
        const ready = existing.trim().length >= 3;
        const nextTarget = state.round < 2 ? 'nextRound' : 'echo';
        const nextLabel = state.round < 2 ? 'log it → next round' : 'log it → close the circle';
        return `
          <div class="screen fade-in">
            <div class="tiny">round ${state.round + 1} · your trio's move</div>
            <h2 class="serif" style="margin-top: 12px;">write it together.</h2>
            <div style="margin-top: 16px; padding: 18px 20px; background: var(--sand); border-radius: 14px;">
              <div class="prompt serif" style="font-size: 18px; line-height: 1.35;">${SOLVE_PROMPTS[state.round]}</div>
            </div>
            <textarea id="solution-input" class="solution-input" placeholder="one or two concrete sentences…" rows="5">${existing}</textarea>
            <p class="muted tiny" style="margin-top: 10px;">everyone writes their own version on their own device. this stays with you.</p>
            <div class="spacer"></div>
            <button class="btn-primary" data-go="${nextTarget}" ${ready ? '' : 'disabled'} id="solve-continue" style="width: 100%;">
              ${ready ? nextLabel : 'write to continue'}
            </button>
          </div>`;
      },

      echo: () => `
        <div class="screen fade-in">
          <div class="tiny">echo · your trio's three moves</div>
          <h2 class="serif" style="margin-top: 10px;">what you made together.</h2>
          <p class="muted" style="margin-top: 14px; font-size: 15px;">
            three scenarios, three moves your trio built. screenshot this if you want to carry it with you.
          </p>
          <div class="solutions-recap">
            ${state.solutions.map((s, i) => {
              const scenarioIdx = state.usedPrompts[i];
              const scenario = scenarioIdx !== undefined ? PROMPTS[scenarioIdx] : '(scenario not recorded)';
              const short = scenario.length > 95 ? scenario.slice(0, 95) + '…' : scenario;
              const move = (s || '').trim();
              return `
                <div class="solution-card">
                  <div class="tiny">round ${i + 1}</div>
                  <div class="scenario">"${short}"</div>
                  <div class="move ${move ? '' : 'empty'}">${move || 'not logged'}</div>
                </div>
              `;
            }).join('')}
          </div>
          <div class="echo-list" style="margin-top: 24px;">
            <div class="echo-q">looking at all three: which move is your trio most likely to actually try?</div>
            <div class="echo-q">which of your own responses surprised you?</div>
          </div>
          <div class="spacer"></div>
          <button class="btn-primary" data-go="close" style="width: 100%;">i'm ready to close</button>
        </div>`,

      close: () => `
        <div class="screen fade-in">
          <div class="spacer"></div>
          <div style="text-align: center;">
            <div class="serif" style="font-size: 44px; line-height: 1.1; font-weight: 300;">thank you<br/>for reading<br/>with us.</div>
            <p class="muted" style="margin-top: 28px; font-size: 15px; max-width: 320px; margin-left: auto; margin-right: auto;">
              three readings are not three answers. they are three ways a room can hold the same moment.
            </p>
          </div>
          <div class="spacer"></div>
          <div class="footer-actions">
            <div class="muted tiny"><span class="wv-wordmark">winded.vertigo</span> · feel cards</div>
            <button class="btn-ghost" data-go="welcome">play again</button>
          </div>
        </div>`,
    };

    // ---------- EVENT WIRING ----------
    function wireEvents() {
      // Navigation buttons
      document.querySelectorAll('[data-go]').forEach(btn => {
        btn.addEventListener('click', e => {
          if (btn.hasAttribute('disabled')) return;
          const target = btn.getAttribute('data-go');
          if (target === 'nextRound') {
            state.round += 1;
            state.hand = [];
            state.selectedCardId = null;
            state.currentPromptIdx = null;
            // solutions array is preserved intentionally
            go('roundIntro');
          } else if (target === 'welcome') {
            // Full reset
            state.position = null;
            state.difficulty = null;
            state.round = 0;
            state.hand = [];
            state.selectedCardId = null;
            state.usedPrompts = [];
            state.currentPromptIdx = null;
            state.solutions = ['', '', ''];
            go('welcome');
          } else {
            go(target);
          }
        });
      });

      // Back buttons
      document.querySelectorAll('[data-back]').forEach(btn => {
        btn.addEventListener('click', () => {
          const target = btn.getAttribute('data-back');
          go(target);
        });
      });

      // Position picker
      document.querySelectorAll('[data-pos]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.position = parseInt(btn.getAttribute('data-pos'), 10);
          render();
        });
      });

      // Difficulty picker
      document.querySelectorAll('[data-diff]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.difficulty = btn.getAttribute('data-diff');
          render();
        });
      });

      // Card picker
      document.querySelectorAll('[data-pick]').forEach(card => {
        card.addEventListener('click', () => {
          const id = parseInt(card.getAttribute('data-pick'), 10);
          state.selectedCardId = id;
          render();
        });
      });

      // Solution textarea — update state & toggle continue button without re-rendering
      const ta = document.getElementById('solution-input');
      if (ta) {
        ta.addEventListener('input', () => {
          state.solutions[state.round] = ta.value;
          const btn = document.getElementById('solve-continue');
          if (btn) {
            const ready = ta.value.trim().length >= 3;
            if (ready) {
              btn.removeAttribute('disabled');
              btn.textContent = state.round < 2 ? 'log it → next round' : 'log it → close the circle';
            } else {
              btn.setAttribute('disabled', '');
              btn.textContent = 'write to continue';
            }
          }
        });
      }
    }

    // ---------- INIT ----------
    render();
  </script>
</body>
</html>
