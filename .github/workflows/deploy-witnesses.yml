name: deploy the-witnesses

on:
  push:
    branches: [main]
    paths:
      - "the-witnesses/**"
      - ".github/workflows/deploy-witnesses.yml"
  workflow_dispatch:

concurrency:
  group: deploy-witnesses
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: "097c92553b268f8360b74f625f6d980a"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: the-witnesses/package-lock.json

      - name: install dependencies
        working-directory: the-witnesses
        run: npm ci --no-audit --no-fund

      - name: build next.js
        working-directory: the-witnesses
        run: npm run build

      - name: bundle for cloudflare workers (opennext)
        working-directory: the-witnesses
        run: npx @opennextjs/cloudflare build --skipNextBuild

      - name: deploy to cloudflare workers
        working-directory: the-witnesses
        run: npx wrangler deploy

      - name: smoke check
        run: |
          sleep 30
          for i in 1 2 3 4 5; do
            code=$(curl -sS -o /tmp/body -w "%{http_code}" https://wv-witnesses.windedvertigo.workers.dev/)
            echo "attempt ${i}: HTTP ${code}"
            if [ "$code" = "200" ]; then
              echo "✓ wv-witnesses.windedvertigo.workers.dev responding 200"
              exit 0
            fi
            sleep 10
          done
          echo "::warning::deploy succeeded but smoke check did not confirm within 80s"
